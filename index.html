<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔓 Vol de données en cours...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #hacker-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px lime;
            animation: clignoter 1s infinite;
        }
        @keyframes clignoter {
            0% { opacity: 1; }
            50% { opacity: 0.5; text-shadow: 0 0 20px green; }
            100% { opacity: 1; }
        }
        #data-line {
            font-size: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid lime;
            width: 0;
            animation: typing 3s steps(40) infinite, blink 0.7s infinite;
        }
        @keyframes typing {
            0% { width: 0; }
            50% { width: 100%; }
            100% { width: 0; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #0f0;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="hacker-text">⚠️ VOL DE DONNÉES EN COURS ⚠️</div>
    <div id="data-line">Accès base sécurisée... ████ 40% ████████ 80% ████████████ 100%</div>
    <footer>mustaphaad3-cmd • mouss-bug</footer>

    <canvas id="matrix"></canvas>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
