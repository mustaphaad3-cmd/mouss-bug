<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🔴 ALERTE NAYIM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: red;
            position: relative;
        }
        .container {
            z-index: 10;
            padding: 30px;
            border: 3px solid red;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 50px red;
            max-width: 800px;
            animation: clignoter 1.5s infinite;
        }
        @keyframes clignoter {
            0% { box-shadow: 0 0 20px red; }
            50% { box-shadow: 0 0 80px red; }
            100% { box-shadow: 0 0 20px red; }
        }
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 10px red; }
            50% { text-shadow: 0 0 30px red, 0 0 60px orange; }
            100% { text-shadow: 0 0 10px red; }
        }
        .message {
            font-size: 2rem;
            margin: 30px 0;
            color: lime;
        }
        .bzz {
            font-size: 5rem;
            font-weight: bold;
            color: yellow;
            animation: bzz 0.5s infinite;
        }
        @keyframes bzz {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-3px); }
            100% { transform: translateX(0); }
        }
        .countdown {
            font-size: 3rem;
            margin: 30px 0;
            color: white;
        }
        .warning {
            font-size: 1.5rem;
            color: orange;
            margin: 20px 0;
        }
        .danger {
            color: red;
            font-size: 2rem;
            font-weight: bold;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }
        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <h1>⚠️ NAYIM ⚠️</h1>
        <div class="bzz">📵 BZZZZT 📵</div>
        <div class="message">
            Nayim, je vais te bzz<br>
            supprime le lien c tout
        </div>
        <div class="countdown" id="countdown">5</div>
        <div class="warning">🔴 SUPPRESSION EN COURS 🔴</div>
        <div class="danger">⚡ ACCÈS BLOQUÉ ⚡</div>
        <div class="footer">🔐 Sécurité • Avertissement • Nayim</div>
    </div>

    <script>
        // Matrix background effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'NAYIM010101010101010101';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // Countdown
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownEl.textContent = "💀 SUPPRIMÉ 💀";
                document.querySelector('.danger').innerHTML = "🔴 LIEN DÉTRUIT 🔴";
                document.querySelector('.warning').innerHTML = "NAYIM • BZZZT • FIN";
            }
        }, 1000);

        // Random scares
        setInterval(() => {
            if (Math.random() > 0.7) {
                document.body.style.backgroundColor = 'red';
                setTimeout(() => {
                    document.body.style.backgroundColor = 'black';
                }, 100);
            }
        }, 3000);
    </script>
</body>
</html>
